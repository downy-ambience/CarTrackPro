# Render Blueprint
# https://render.com/docs/blueprint-spec

services:
  - type: web
    name: cartrackpro
    runtime: node
    region: singapore
    plan: free
    buildCommand: npm install && npm run build
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: GOOGLE_SERVICE_ACCOUNT_KEY
        sync: false
      - key: GOOGLE_SPREADSHEET_ID
        sync: false
